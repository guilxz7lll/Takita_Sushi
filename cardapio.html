<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Takita Sushi | Cardápio</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="header">

    <nav class="navbar">

      <a href="index.html" class="logo">

        <div class="logo-mark">
          <img src="logo.png" alt="Takita Sushi" />
        </div>

      </a>

      <ul class="nav-menu">

        <li>
          <a href="index.html">
            Início
          </a>
        </li>

        <li>
          <a
            href="cardapio.html"
            class="active"
          >
            Cardápio
          </a>
        </li>

        <li>
          <a href="barcas.html">
            Barcas
          </a>
        </li>

        <li>
          <a href="personalizados.html">
            Eventos
          </a>
        </li>

      </ul>

      <button
        class="cart-button"
        id="openCartBtn"
        type="button"
      >

        <i data-lucide="shopping-bag"></i>

        <span id="cartCount">
          0
        </span>

      </button>

    </nav>

  </header>

  <!-- ================= MAIN ================= -->
  <main>

    <!-- ================= CATEGORIAS ================= -->
    <section class="categories-section">

      <div class="section-title">

        <span>Menu</span>

        <h2>
          Cardápio Takita Sushi
        </h2>

        <p>
          Escolha uma categoria e monte seu pedido.
        </p>

      </div>

      <div class="category-buttons">

        <button
          class="category-btn active"
          type="button"
          data-category="todos"
        >
          Todos
        </button>

        <button
          class="category-btn"
          type="button"
          data-category="hot-holl"
        >
          Hot Holl's
        </button>

        <button
          class="category-btn"
          type="button"
          data-category="temaki"
        >
          Temaki's
        </button>

        <button
          class="category-btn"
          type="button"
          data-category="barca"
        >
          Barcas
        </button>

        <button
          class="category-btn"
          type="button"
          data-category="hossomaki"
        >
          Hossomakis
        </button>

        <button
          class="category-btn"
          type="button"
          data-category="bebidas"
        >
          Bebidas
        </button>

      </div>

    </section>

    <!-- ================= CARDÁPIO ================= -->
    <section
      class="menu-section"
      id="cardapio"
    >

      <div
        class="menu-grid"
        id="menuGrid"
      >

        <!-- PRODUTOS -->

      </div>

    </section>

  </main>

  <!-- ================= CARRINHO ================= -->
  <aside
    class="cart-drawer"
    id="cartDrawer"
  >

    <div class="cart-header">

      <div>

        <span>
          Seu pedido
        </span>

        <h2>
          Carrinho
        </h2>

      </div>

      <button
        class="close-btn"
        id="closeCartBtn"
        type="button"
      >

        <i data-lucide="x"></i>

      </button>

    </div>

    <div
      class="cart-items"
      id="cartItems"
    >

      <p class="empty-cart">
        Seu carrinho está vazio.
      </p>

    </div>

    <div class="cart-footer">

      <div class="cart-total">

        <span>
          Total
        </span>

        <strong id="cartTotal">
          R$ 0,00
        </strong>

      </div>

      <button
        class="btn btn-primary full"
        id="checkoutBtn"
        type="button"
      >

        <i data-lucide="send"></i>

        Finalizar pedido

      </button>

      <button
        class="clear-cart"
        id="clearCartBtn"
        type="button"
      >
        Limpar carrinho
      </button>

    </div>

  </aside>

  <!-- ================= MODAL ================= -->
  <section
    class="checkout-modal"
    id="checkoutModal"
  >

    <div class="modal-content">

      <button
        class="close-btn modal-close"
        id="closeModalBtn"
        type="button"
      >

        <i data-lucide="x"></i>

      </button>

      <span>
        Finalização
      </span>

      <h2>
        Dados do pedido
      </h2>

      <form id="checkoutForm">

        <label for="customerName">

          Nome

          <input
            type="text"
            id="customerName"
            placeholder="Digite seu nome"
            required
          />

        </label>

        <label for="customerPhone">

          Telefone

          <input
            type="tel"
            id="customerPhone"
            placeholder="Digite seu telefone"
            required
          />

        </label>

        <label for="customerAddress">

          Endereço

          <input
            type="text"
            id="customerAddress"
            placeholder="Digite seu endereço"
            required
          />

        </label>

        <button
          class="location-btn"
          id="getLocationBtn"
          type="button"
        >

          <i data-lucide="map-pin"></i>

          Compartilhar localização

        </button>

        <!-- LOCALIZAÇÃO OCULTA -->
        <input
          type="hidden"
          id="customerLocation"
        />

        <label for="paymentMethod">

          Forma de pagamento

          <select
            id="paymentMethod"
            required
          >

            <option value="">
              Selecione
            </option>

            <option value="Pix">
              Pix
            </option>

            <option value="Dinheiro">
              Dinheiro
            </option>

            <option value="Cartão na entrega">
              Cartão na entrega
            </option>

          </select>

        </label>

        <label for="customerNote">

          Observação

          <textarea
            id="customerNote"
            placeholder="Ex: retirar algo, mandar molho extra..."
          ></textarea>

        </label>

        <button
          class="btn btn-primary full"
          type="submit"
        >

          <i data-lucide="message-circle"></i>

          Enviar no WhatsApp

        </button>

      </form>

    </div>

  </section>

  <!-- ================= TOAST ================= -->
  <div
    class="toast"
    id="toast"
  >
    Produto adicionado ao carrinho.
  </div>

  <!-- ================= OVERLAY ================= -->
  <div
    class="overlay"
    id="overlay"
  ></div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">

    <strong>
      Takita Sushi
    </strong>

    <p>
      O melhor sushi da cidade!
    </p>

  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="script.js"></script>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
